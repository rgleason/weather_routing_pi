steps:
  - uses: actions/checkout@v4

  - name: MSVC dev cmd (x86)
    uses: ilammy/msvc-dev-cmd@v1
    with:
      arch: x86

  - name: Checkout wxWidgets
    uses: actions/checkout@v4
    with:
      repository: wxWidgets/wxWidgets
      ref: v3.2.5
      path: wxWidgets

  - name: Build wxWidgets (Win32, DLL, release)
    shell: pwsh
    run: |
      cd "$env:GITHUB_WORKSPACE\wxWidgets\build\msw"
      nmake /f makefile.vc BUILD=release SHARED=1 RUNTIME_LIBS=dynamic TARGET_CPU=X86

  - name: Set wxWidgets environment variables
    shell: pwsh
    run: |
      "WXWIN=$env:GITHUB_WORKSPACE\wxWidgets" | Out-File -FilePath $env:GITHUB_ENV -Append
      "wxWidgets_ROOT_DIR=$env:GITHUB_WORKSPACE\wxWidgets" | Out-File -FilePath $env:GITHUB_ENV -Append
      "wxWidgets_LIB_DIR=$env:GITHUB_WORKSPACE\wxWidgets\lib\vc_dll" | Out-File -FilePath $env:GITHUB_ENV -Append

  - name: Diagnostic - list wxWidgets lib dir
    shell: pwsh
    run: |
      Write-Host "WXWIN=$env:WXWIN"
      Write-Host "wxWidgets_ROOT_DIR=$env:wxWidgets_ROOT_DIR"
      Write-Host "wxWidgets_LIB_DIR=$env:wxWidgets_LIB_DIR"
      if (Test-Path "$env:wxWidgets_LIB_DIR") {
        Get-ChildItem -Force "$env:wxWidgets_LIB_DIR"
      } else {
        Write-Error "Expected wxWidgets lib dir not found: $env:wxWidgets_LIB_DIR"
      }

  - name: Configure (CMake, Win32, RelWithDebInfo)
    shell: pwsh
    run: |
      cmake -S . -B build `
        -G "Visual Studio 17 2022" -A Win32 -T v143 `
        -DOCPN_TARGET=MSVC `
        -DwxWidgets_ROOT_DIR="$env:wxWidgets_ROOT_DIR" `
        -DwxWidgets_LIB_DIR="$env:wxWidgets_LIB_DIR"

  - name: Build (RelWithDebInfo)
    run: cmake --build build --target package --config RelWithDebInfo

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: windows-win32-rdeb-package
      path: build/**