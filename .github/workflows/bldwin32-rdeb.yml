name: Windows Win32 Build (rdeb)

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:

jobs:
  build-win32:
    runs-on: windows-latest

    env:
      VCPKG_ROOT: C:\vcpkg
      TRIPLET: x86-windows

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg %VCPKG_ROOT%
        %VCPKG_ROOT%\bootstrap-vcpkg.bat

    - name: Install wxWidgets (Win32)
      run: |
        %VCPKG_ROOT%\vcpkg.exe install wxwidgets:%TRIPLET%

    - name: Configure CMake (Win32)
      run: |
        cmake -S . -B build-win32 ^
          -A Win32 ^
          -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake ^
          -DVCPKG_TARGET_TRIPLET=%TRIPLET% ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DwxWidgets_USE_STATIC=ON ^
          -DwxWidgets_CONFIG_OPTIONS="--unicode"

    - name: Build (Win32)
      run: cmake --build build-win32 --config Release --parallel

    - name: Package artifacts
      uses: actions/upload-artifact@v4
      with:
        name: weather_routing_win32
        path: build-win32/Release
