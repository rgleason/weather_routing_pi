name: bldwin32-rdeb

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build-win32:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4 

      - name: MSVC dev cmd (x86)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      # Classic vcpkg mode — required for Win32/x86
      - name: Install wxWidgets via vcpkg (x86-windows)
        uses: lukka/run-vcpkg@v11
        with:
          runVcpkgInstall: true
          runVcpkgFormatString: install wxwidgets:x86-windows

      - name: Debug vcpkg environment
        shell: pwsh
        run: |
          echo "VCPKG_INSTALLATION_ROOT=$env:VCPKG_INSTALLATION_ROOT"
          echo "Installed triplets:"
          dir "$env:VCPKG_INSTALLATION_ROOT\installed"

      - name: Configure (CMake, Win32, RelWithDebInfo)
        shell: pwsh
        run: |
          $triplet = "x86-windows"
          $root = "$env:VCPKG_INSTALLATION_ROOT\installed\$triplet"

          cmake -S . -B build `
            -G "Visual Studio 17 2022" -A Win32 -T v143 `
            -DOCPN_TARGET=MSVC `
            -DwxWidgets_ROOT_DIR="$root" `
            -DwxWidgets_LIB_DIR="$root\lib" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"

      - name: Build (RelWithDebInfo)
        run: cmake --build build --target package --config RelWithDebInfo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-win32-rdeb-package
          path: build/**
